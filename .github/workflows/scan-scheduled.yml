name: scan-scheduled
# Re-scan the ALREADY-PUBLISHED image on a schedule. A clean image today can
# become vulnerable tomorrow when a new CVE is disclosed against a package
# baked into it — build-time scanning never re-checks that. This catches it.
on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

jobs:
  scan-published:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Trivy scan of published :latest (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/mitchallen/mcp-hello-typescript-server:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: false

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-scheduled
