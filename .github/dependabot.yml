version: 2
# Keeps the image and its dependencies patched automatically. This is the
# "stay up to date" half of vulnerability management — image-scan.yml and
# npm-audit.yml detect vulns, Dependabot opens the PRs that fix them. Low-risk
# updates (github-actions; npm/docker minor+patch) are auto-merged once CI
# passes — see .github/workflows/dependabot-auto-merge.yml.
updates:
  # npm dependencies (package.json / package-lock.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  # Base images in the Dockerfile (chainguard/node builder + runtime).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
