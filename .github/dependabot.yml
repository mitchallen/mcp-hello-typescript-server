version: 2
# Keeps the image and its dependencies patched automatically. This is the
# "stay up to date" half of vulnerability management — image-scan.yml and
# npm-audit.yml detect vulns, Dependabot opens the PRs that fix them. Low-risk
# updates (github-actions; npm/docker minor+patch) are auto-merged once CI
# passes — see .github/workflows/dependabot-auto-merge.yml.
updates:
  # npm dependencies (package.json / package-lock.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    ignore:
      # Pin zod to 3.x: the MCP TypeScript SDK and the official "Build a server"
      # reference target zod 3, and zod 4 is a breaking major incompatible with
      # the SDK's expected schema types. Still get 3.x minor/patch updates.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      # Hold at typescript 5.x: 7.0.x is the new native (Go) compiler and no
      # longer auto-includes @types/*, so a major bump needs a tsconfig change
      # (types: ["node"]) to build. Too fresh to adopt mid-scaffold; still get
      # 5.x minor/patch updates.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Base images in the Dockerfile (chainguard/node builder + runtime).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
